server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — serve index.html for any path that doesn't match a file.
    # Without this, refreshing on /dashboard or any deep-link returns 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite fingerprints asset filenames (e.g. index-Ce2LTVnv.js), so it is
    # safe to cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
